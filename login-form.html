<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #1a1b2e;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 40px 30px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 28px;
    }

    .subtitle {
      text-align: center;
      color: #aaa;
      margin-bottom: 30px;
      font-size: 15px;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #ccc;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      background: #25263a;
      border: 1px solid #444;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: all 0.3s;
    }

    input:focus {
      border-color: #4ade80;
      box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.2);
    }

    input.error {
      border-color: #ff4d6d;
    }

    .toggle-pass {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #888;
      font-size: 18px;
      cursor: pointer;
    }

    .input-wrapper {
      position: relative;
    }

    .err-msg {
      color: #ff4d6d;
      font-size: 13px;
      margin-top: 6px;
      display: none;
    }

    .err-msg.show {
      display: block;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 15px 0 25px;
      font-size: 14px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: #ccc;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #4ade80;
      color: #0f0f1a;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 20px;
      transition: background 0.3s;
    }

    .btn:hover {
      background: #22c55e;
    }

    .divider {
      text-align: center;
      margin: 20px 0;
      color: #666;
      font-size: 14px;
      position: relative;
    }

    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: #333;
    }

    .divider span {
      background: #1a1b2e;
      padding: 0 15px;
    }

    .social-btns {
      display: flex;
      gap: 12px;
    }

    .social-btn {
      flex: 1;
      padding: 12px;
      background: #25263a;
      border: 1px solid #444;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 15px;
    }

    .social-btn:hover {
      border-color: #4ade80;
    }

    .footer {
      text-align: center;
      margin-top: 25px;
      font-size: 14px;
      color: #888;
    }

    .footer a {
      color: #4ade80;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to continue</p>

    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="off"/>
      <div class="err-msg" id="email-err">Please enter a valid email address</div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrapper">
        <input type="password" id="password" placeholder="Enter your password"/>
        <button type="button" class="toggle-pass" id="togglePass">👁</button>
      </div>
      <div class="err-msg" id="pass-err">Password must be at least 8 characters</div>
    </div>

    <div class="row">
      <label class="checkbox-label">
        <input type="checkbox" id="remember">
        Remember me
      </label>
      <a href="#" style="color:#4ade80; text-decoration:none;">Forgot password?</a>
    </div>

    <button class="btn" id="loginBtn">Sign In</button>

    <div class="divider"><span>or continue with</span></div>

    <div class="social-btns">
      <button class="social-btn" onclick="socialLogin('Google')">
        <strong>G</strong> Google
      </button>
      <button class="social-btn" onclick="socialLogin('GitHub')">
        <strong>GitHub</strong>
      </button>
    </div>

    <div class="footer">
      Don't have an account? <a href="#">Create one</a>
    </div>
  </div>

  <script>
    // Toggle password visibility
    document.getElementById('togglePass').addEventListener('click', function () {
      const passwordField = document.getElementById('password');
      if (passwordField.type === 'password') {
        passwordField.type = 'text';
        this.textContent = '🙈';
      } else {
        passwordField.type = 'password';
        this.textContent = '👁';
      }
    });

    // Simple validation
    function validateForm() {
      let isValid = true;

      const email = document.getElementById('email');
      const password = document.getElementById('password');
      const emailErr = document.getElementById('email-err');
      const passErr = document.getElementById('pass-err');

      // Email validation
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email.value.trim() || !emailRegex.test(email.value.trim())) {
        email.classList.add('error');
        emailErr.classList.add('show');
        isValid = false;
      } else {
        email.classList.remove('error');
        emailErr.classList.remove('show');
      }

      // Password validation
      if (password.value.length < 8) {
        password.classList.add('error');
        passErr.classList.add('show');
        isValid = false;
      } else {
        password.classList.remove('error');
        passErr.classList.remove('show');
      }

      return isValid;
    }

    // Login handler
    document.getElementById('loginBtn').addEventListener('click', function () {
      if (validateForm()) {
        const remember = document.getElementById('remember').checked;
        
        alert(`✅ Login Successful!\n\nEmail: ${document.getElementById('email').value}\nRemember Me: ${remember ? 'Yes' : 'No'}`);
        
        // You can redirect here in real project:
        // window.location.href = "/dashboard";
      } else {
        alert('❌ Please fix the errors and try again.');
      }
    });

    // Social login
    function socialLogin(provider) {
      alert(`🔗 Connecting to ${provider}... (Demo)`);
    }

    // Real-time validation on blur
    document.getElementById('email').addEventListener('blur', validateForm);
    document.getElementById('password').addEventListener('blur', validateForm);
  </script>

</body>
</html>
